version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: crabbyq-nats
    ports:
      - "4222:4222"  # client port
      - "8222:8222"  # monitoring port
    command: [
      "--http_port", "8222",
    ]
    volumes:
      - nats-data:/tmp/nats
    restart: unless-stopped

volumes:
  nats-data: